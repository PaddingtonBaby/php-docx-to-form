<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DOCX → INTERACTIVE</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <style>
            .upload-area {
                border: 2px dashed #dee2e6; border-radius: 12px; padding: 48px 24px;
                text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
            }
            .upload-area:hover, .upload-area.dragover { border-color: #0d6efd; background: #f0f6ff; }

            .img-wrap { position: relative; line-height: 0; }
            .img-wrap img { width: 100%; display: block; }
            .img-overlay { position: absolute; inset: 0; pointer-events: none; }
            .marker {
                position: absolute; pointer-events: auto; appearance: none; padding: 0;
                width: 22px; height: 22px; border-radius: 50%; border: 2px solid #0d6efd;
                background: rgba(255,255,255,.92); color: #084298;
                font: 700 10px/1 system-ui; display: flex; align-items: center; justify-content: center;
                transform: translate(-50%, -50%); cursor: pointer; z-index: 2;
                box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: transform .1s;
            }
            .marker:hover, .marker.is-active  { transform: translate(-50%,-50%) scale(1.3); background: #0d6efd; color: #fff; z-index: 4; }
            .marker.is-filled                  { border-color: #198754; background: #d1e7dd; color: #0f5132; }
            .marker.is-active.is-filled        { background: #198754; color: #fff; border-color: #198754; }
            .marker.is-duplicate               { width: 16px; height: 16px; font-size: 8px; opacity: .55; z-index: 1; border-color: #adb5bd; color: #6c757d; background: #f8f9fa; }

            .debug-pre { background: #1e293b; color: #e2e8f0; font-size: 11px; max-height: 240px; overflow: auto; }
        </style>
    </head>
        <body class="bg-light">
        <div class="container py-4" style="max-width:1200px">
            <div id="statusBar" class="d-flex flex-wrap gap-2 mb-3"></div>

            <div id="uploadSection">
                <div class="upload-area bg-white" id="uploadArea">
                    <input type="file" id="fileInput" accept=".docx" hidden>
                    <div class="fs-1 mb-2">📄</div>
                    <p class="text-muted small mb-0">Перетащите .docx шаблон сюда или нажмите, чтобы выбрать</p>
                </div>
            </div>

            <div id="loadingSection" class="text-center py-5 d-none">
                <div class="spinner-border text-primary" role="status" style="width:1.5rem;height:1.5rem"></div>
                <p class="mt-2 mb-0 small text-muted">Конвертация шаблона…</p>
                <p class="text-muted" style="font-size:11px">LibreOffice → PDF → JPEG → извлечение координат</p>
            </div>

            <div id="debugSection" class="d-none"></div>

            <div id="editorSection" class="d-none mt-3">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="badge bg-secondary" id="progressPill">0 / 0 заполнено</span>
                            <a href="#" id="resetBtn" class="small text-muted">← Загрузить другой шаблон</a>
                        </div>
                        <div class="border rounded overflow-hidden bg-white" id="canvas"></div>
                    </div>
                    <div class="col-md-4">
                        <div class="card mb-2">
                            <div class="card-body p-3">
                                <span class="badge bg-primary mb-2" id="activeFieldChip">Поле</span>
                                <p class="small text-muted mb-2" id="fieldHint">Кликните по нумерованному маркеру в документе, чтобы заполнить поле.</p>
                                <p class="small text-muted bg-light rounded p-2 mb-0" id="fieldEmptyState">Выберите нумерованный круг на шаблоне.</p>
                                <div id="fieldEditor" class="d-none">
                                    <p class="fw-semibold small mb-1" id="fieldLabel"></p>
                                    <p class="text-muted mb-2" style="font-size:11px" id="fieldRequired"></p>
                                    <div id="fieldInputWrapper"></div>
                                </div>
                                <div id="fieldList" class="d-flex flex-column gap-2 mt-3"></div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100" id="downloadBtn" disabled>Скачать заполненный DOCX</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
            <div id="toastEl" class="toast align-items-center text-bg-dark border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body" id="toastMsg"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        const API = 'api';
        let state = { templateId: null, fields: [], values: {}, active: null, pages: [] };

        fetch(`${API}/status.php`).then(r => r.json()).then(d => {
            document.getElementById('statusBar').innerHTML = [
                `<span class="badge ${d.ok ? 'bg-success' : 'bg-danger'}">${d.ok ? '✓ Готово' : '✗ Проблемы'}</span>`,
                `<span class="badge bg-secondary">PHP ${d.php_version}</span>`,
                `<span class="badge ${d.phpword_installed ? 'bg-success' : 'bg-danger'}">PhpWord ${d.phpword_installed ? '✓' : '✗'}</span>`,
                ...Object.entries(d.dependencies || {}).map(([k, v]) =>
                    `<span class="badge ${v ? 'bg-success' : 'bg-danger'}">${k} ${v ? '✓' : '✗'}</span>`),
            ].join('');
        }).catch(() => {
            document.getElementById('statusBar').innerHTML = '<span class="badge bg-danger">Нет коннекта с API</span>';
        });

        const uploadArea = document.getElementById('uploadArea');
        const fileInput  = document.getElementById('fileInput');
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

        async function handleFile(file) {
            if (!file?.name.endsWith('.docx')) return toast('Поддерживаются только .docx файлы');

            show('loadingSection'); hide('uploadSection'); hide('editorSection'); hide('debugSection');
            try {
                const fd = new FormData();
                fd.append('template', file);
                const d = await fetch(`${API}/convert.php`, { method: 'POST', body: fd }).then(r => r.json());
                if (!d.success) throw new Error(d.error);

                Object.assign(state, { templateId: d.template_id, fields: d.fields, values: {}, active: null, pages: d.pages || [] });

                document.getElementById('debugSection').innerHTML =
                    `<details class="mb-3"><summary class="text-muted small" style="cursor:pointer">Отладочная информация</summary>` +
                    `<pre class="debug-pre rounded p-2 mt-1">${JSON.stringify(d.debug, null, 2)}</pre></details>`;
                show('debugSection');

                renderCanvas(d.pages);
                renderSidebar();
                show('editorSection');
                if (state.fields.length) activateField(state.fields[0].name);
            } catch (e) {
                toast('Ошибка: ' + e.message);
                resetToUpload();
            } finally {
                hide('loadingSection');
            }
        }

        function renderCanvas(pages) {
            const seen = new Set();
            const container = document.getElementById('canvas');
            container.innerHTML = pages.map((page, pageIdx) => {
                const pins = (page.markers || []).map(m => {
                    const dup = seen.has(m.index) || m.duplicate;
                    seen.add(m.index);
                    const fld = state.fields[m.index - 1] || {};
                    return `<button class="marker${dup ? ' is-duplicate' : ''}" data-field="${fld.name || ''}"
                                title="${fld.label || ''}" style="left:${m.leftPct}%;top:${m.topPct}%">${m.index}</button>`;
                }).join('');

                const separator = pageIdx > 0 ? '<hr class="my-2 border-secondary">' : '';
                return `${separator}<div class="img-wrap"><img src="${page.image}" alt="Страница ${pageIdx + 1}" draggable="false">` +
                    `<div class="img-overlay">${pins}</div></div>`;
            }).join('');

            container.querySelectorAll('.marker').forEach(b => b.addEventListener('click', () => activateField(b.dataset.field)));
        }

        function renderSidebar() {
            const { fields, values, active } = state;
            const filled = fields.filter(f => values[f.name]?.trim()).length;

            document.getElementById('progressPill').textContent = `${filled} / ${fields.length} заполнено`;
            document.getElementById('downloadBtn').disabled = filled === 0;

            document.getElementById('fieldList').innerHTML = fields.map((f, i) => {
                const val = (values[f.name] || '').trim();
                const isActive = f.name === active;
                const cls = isActive ? 'border-primary bg-primary-subtle' : val ? 'border-success bg-success-subtle' : 'border';
                const badgeCls = isActive ? 'bg-primary' : val ? 'bg-success' : 'bg-secondary';
                return `<button class="btn btn-sm text-start w-100 ${cls}" onclick="activateField('${f.name}')">
                    <span class="badge ${badgeCls} me-1">${i + 1}</span>
                    <span class="small fw-semibold">${f.label || f.name}</span>
                    <span class="d-block ms-4 text-muted" style="font-size:11px">${val || 'Не заполнено'}</span>
                </button>`;
            }).join('');

            document.querySelectorAll('.marker').forEach(m => {
                const v = (values[m.dataset.field] || '').trim() !== '';
                m.classList.toggle('is-active', m.dataset.field === active);
                m.classList.toggle('is-filled', v);
            });
        }

        function activateField(name) {
            const field = state.fields.find(f => f.name === name);
            if (!field) return;
            state.active = name;

            document.getElementById('activeFieldChip').textContent = `Поле ${state.fields.indexOf(field) + 1}`;
            document.getElementById('fieldHint').classList.add('d-none');
            document.getElementById('fieldEmptyState').classList.add('d-none');
            document.getElementById('fieldRequired').textContent = field.required ? 'Обязательное поле' : 'Необязательное поле';
            document.getElementById('fieldLabel').textContent = field.label || field.name;

            const typeMap = { date: 'date', number: 'number', phone: 'tel' };
            const el = document.createElement(field.type === 'textarea' ? 'textarea' : 'input');
            el.className = 'form-control form-control-sm';
            if (el.tagName === 'INPUT') el.type = typeMap[field.type] || 'text';
            if (field.type === 'textarea') el.rows = 3;
            el.placeholder = field.type === 'phone' ? '+7 (___) ___-__-__' : (field.label || field.name);
            el.value = state.values[name] || '';
            el.addEventListener('input', e => { state.values[name] = e.target.value; renderSidebar(); });

            document.getElementById('fieldInputWrapper').replaceChildren(el);
            document.getElementById('fieldEditor').classList.remove('d-none');
            el.focus();
            renderSidebar();
        }

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true; btn.textContent = 'Генерация…';
            try {
                const res = await fetch(`${API}/fill.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template_id: state.templateId, data: state.values }),
                });
                if (!res.ok) throw new Error((await res.json()).error || 'Ошибка сервера');
                const url = URL.createObjectURL(await res.blob());
                const a = Object.assign(document.createElement('a'), { href: url, download: 'заполненный_документ.docx' });
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                toast('Ошибка: ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Скачать заполненный DOCX';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', e => { e.preventDefault(); resetToUpload(); });

        function resetToUpload() {
            Object.assign(state, { templateId: null, fields: [], values: {}, active: null, pages: [] });
            fileInput.value = '';
            hide('editorSection'); hide('debugSection'); hide('loadingSection');
            show('uploadSection');
        }

        function show(id) { document.getElementById(id).classList.remove('d-none'); }
        function hide(id) { document.getElementById(id).classList.add('d-none'); }
        function toast(msg) {
            document.getElementById('toastMsg').textContent = msg;
            new bootstrap.Toast(document.getElementById('toastEl'), { delay: 4000 }).show();
        }
        </script>
    </body>
</html>
